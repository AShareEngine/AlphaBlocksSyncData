name = "amazingdata"
display_name = "AmazingData SDK"
version = "0.1.0"
module = "sync_data_system.providers.amazingdata"
runtime_config_key = "amazingdata"
default_database = "starlight"
plans_path = "plans"
dependencies = ["pandas", "clickhouse-connect"]
import_modules = ["AmazingData"]

[entrypoints]
provider = "provider:AmazingDataSDKProvider"
repository = "repository:BaseDataRepository"
runner = "runner:run_config_file"
config_runner = "runner:run_config_file"
context_builder = "runner:build_context"
registered_task_runner = "runner:run_registered_task"
specs = "specs:AMAZINGDATA_TASK_SPECS"

