# QMT REST 数据源示例同步配置
#
# 用法：
#   python3 scripts/run_provider_sync.py --config run_sync.qmt.sample.toml
#
# 说明：
# - QMT 走 docs/qmt-data.md 里的 REST 服务
# - 需要先在 config/runtime.local.yaml 配置 sync.qmt.base_url / sync.qmt.api_key
# - 首次验证建议显式传少量 symbols

source = "qmt"
log_level = "INFO"
continue_on_error = true
database = "qmt"

[defaults]
symbols = ["600000.SH"]
begin_date = 20240101
end_date = 20240131
limit = 0
force = false
continue_on_error = true

[[tasks]]
task = "kline_history"
enabled = true
period = "1d"
adjust_type = "none"
fill_data = true

[[tasks]]
task = "full_tick"
enabled = false

[[tasks]]
task = "sectors"
enabled = false
sector_name = "沪深A股"

[[tasks]]
task = "trading_calendar"
enabled = false
market = "SH"

