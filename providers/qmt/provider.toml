name = "qmt"
display_name = "QMT REST"
version = "0.1.0"
module = "sync_data_system.providers.qmt"
runtime_config_key = "qmt"
default_database = "qmt"
plans_path = "plans"
dependencies = ["clickhouse-connect"]
import_modules = []

[entrypoints]
provider = "provider:QmtProvider"
repository = "repository:QmtRepository"
runner = "runner:run_sync_args"
config_runner = "runner:run_config_file"
context_builder = "runner:build_context"
registered_task_runner = "runner:run_registered_task"
specs = "specs:QMT_TASK_SPECS"

[[tasks]]
name = "kline_history"
target = "qmt_kline_history"
supports_incremental = true
cursor_field = "time_ms"
request_fields = ["name", "codes", "begin_date", "end_date", "period", "fields", "adjust_type", "fill_data", "limit", "force", "log_level"]

[[tasks]]
name = "tick_history"
target = "qmt_tick_history"
supports_incremental = true
cursor_field = "time_ms"
request_fields = ["name", "codes", "begin_date", "end_date", "fields", "adjust_type", "limit", "force", "log_level"]

[[tasks]]
name = "full_tick"
target = "qmt_full_tick"
supports_incremental = false
request_fields = ["name", "codes", "limit", "force", "log_level"]

[[tasks]]
name = "financial"
target = "qmt_financial"
supports_incremental = false
request_fields = ["name", "codes", "table_names", "begin_date", "end_date", "limit", "force", "log_level"]

[[tasks]]
name = "instrument"
target = "qmt_instrument"
supports_incremental = false
request_fields = ["name", "codes", "complete", "limit", "force", "log_level"]

[[tasks]]
name = "trading_calendar"
target = "qmt_trading_calendar"
supports_incremental = true
cursor_field = "date"
request_fields = ["name", "market", "begin_date", "end_date", "limit", "force", "log_level"]

[[tasks]]
name = "index_weight"
target = "qmt_index_weight"
supports_incremental = false
request_fields = ["name", "index_code", "limit", "force", "log_level"]

[[tasks]]
name = "sectors"
target = "qmt_sectors"
