request_fields = ["name", "sector_name", "limit", "force", "log_level"]

[[tasks]]
name = "l2_quote"
target = "qmt_l2_quote"
supports_incremental = true
cursor_field = "time_ms"
request_fields = ["name", "codes", "begin_date", "end_date", "limit", "force", "log_level"]

[[tasks]]
